# Wren-TTS-360M v1
# LibriSpeech train-clean-{100,360} + full LJSpeech, trained from scratch with EOS fix.
# Casing preserved as-is: LibriSpeech is stored lowercase, LJSpeech is mixed-case.

hf_datasets:     ["shangeth/libritts-r-mimi-codes", "shangeth/ljspeech-mimi-codes"]
hf_splits:       ["train_clean_100,train_clean_360,train_other_500", "train"]
hf_weights:      [1.0, 1.0]

hf_val_datasets: ["shangeth/libritts-r-mimi-codes"]
hf_val_splits:   ["dev_clean"]

k_codebooks: 8
cb_loss_weights: [2.0, 1.5, 1.5, 1.5, 1.25, 1.25, 1.0, 1.0]

multispeaker:    true

eos_loss_weight: 50.0

# Batch sizing: A100-40GB benchmark at bs=16, k=8 delay uses ~21 GB peak / 0.34s/step.
# Effective batch = 32 (bs=16 × grad_accum=2) is a good default for 360M.
batch_size:       16
grad_accum_steps: 2

resume_from:     null
lr:              1.0e-4
lr_warmup_steps: 500
lr_decay_steps:  20000
epochs:          30

checkpoint_dir:  checkpoints/v1-c8-delay
log_dir:         runs/v1-c8-delay
logger:          wandb
wandb_project:   wren
wandb_run_name:  wren-tts-360m-v1-c8-delay
